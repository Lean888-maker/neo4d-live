name: Hourly SEO Supercharge & Verification

on:
  schedule:
    - cron: '0 * * * *' # Hourly SEO Supercharge
    - cron: '30 11 * * *' # 7:30 PM MYT (Evening Results & Indexing)
    - cron: '30 15 * * *' # 11:30 PM MYT (Competitor Audit)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-hourly-bots:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 * * * *' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install Dependencies
        run: npm ci
      - name: Create Environment Variables
        run: |
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > .env.local
          echo "MEDIUM_INTEGRATION_TOKEN=${{ secrets.MEDIUM_INTEGRATION_TOKEN }}" >> .env.local
          echo "BLOGGER_API_KEY=${{ secrets.BLOGGER_API_KEY }}" >> .env.local
          echo "BLOG_ID=${{ secrets.BLOG_ID }}" >> .env.local
          echo "HASHNODE_API_KEY=${{ secrets.HASHNODE_API_KEY }}" >> .env.local
          echo "DEVTO_API_KEY=${{ secrets.DEVTO_API_KEY }}" >> .env.local
          echo "TUMBLR_CONSUMER_KEY=${{ secrets.TUMBLR_CONSUMER_KEY }}" >> .env.local
          echo "TUMBLR_CONSUMER_SECRET=${{ secrets.TUMBLR_CONSUMER_SECRET }}" >> .env.local
          echo "TUMBLR_TOKEN=${{ secrets.TUMBLR_TOKEN }}" >> .env.local
          echo "TUMBLR_TOKEN_SECRET=${{ secrets.TUMBLR_TOKEN_SECRET }}" >> .env.local
          echo "TUMBLR_BLOG_IDENTIFIER=${{ secrets.TUMBLR_BLOG_IDENTIFIER }}" >> .env.local
          echo "WP_API_URL=${{ secrets.WP_API_URL }}" >> .env.local
          echo "WP_USERNAME=${{ secrets.WP_USERNAME }}" >> .env.local
          echo "WP_APP_PASSWORD=${{ secrets.WP_APP_PASSWORD }}" >> .env.local

      - name: Run SEO Health Checker
        run: node seo-bots/seo_checker.js
      - name: Run SEO Supercharge Manager
        run: node seo-bots/supercharge_manager.js
      - name: Commit and Push new SEO Articles
        run: |
          git config --global user.name "seo-supercharge-bot"
          git config --global user.email "seo-bot@neo4d.live"
          git add seo-bots/output/
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto-generated SEO supercharge article" && git push)

  run-evening-broadcast:
    runs-on: ubuntu-latest
    if: github.event.schedule == '30 11 * * *' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install Dependencies
        run: npm ci
      - name: Inject Google Credentials
        run: |
          echo "GOOGLE_APPLICATION_CREDENTIALS_JSON=${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}" > .env.local
      - name: Trigger Telegram Evening Broadcast
        run: curl -X GET "https://neo4d.live/api/cron/telegram-evening" -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
      - name: Force Google Indexing
        run: node seo-bots/google_indexer.js

  run-nightly-audit:
    runs-on: ubuntu-latest
    if: github.event.schedule == '30 15 * * *' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install Dependencies
        run: npm ci
      - name: Inject API Keys
        run: |
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > .env.local
      - name: Run Competitor Auditor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node seo-bots/competitor_auditor.js
      - name: Run FAQ Schema Generator
        run: node seo-bots/faq_schema_generator.js
      - name: Commit and Push FAQ Schema
        run: |
          git config --global user.name "seo-supercharge-bot"
          git config --global user.email "seo-bot@neo4d.live"
          git add src/app/data/faq_schema.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: nightly FAQ schema generation" && git push)
