name: Nightly SEO Audit & FAQ Generation

on:
  schedule:
    - cron: '30 15 * * *' # 11:30 PM MYT
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-nightly-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install Dependencies
        run: npm ci
      - name: Inject API Keys
        run: |
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > .env.local
      - name: Run Competitor Auditor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node seo-bots/competitor_auditor.js
      - name: Run FAQ Schema Generator
        run: node seo-bots/faq_schema_generator.js
      - name: Commit and Push FAQ Schema
        run: |
          git config --global user.name "seo-supercharge-bot"
          git config --global user.email "seo-bot@neo4d.live"
          git add src/app/data/faq_schema.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: nightly FAQ schema generation" && git push)
