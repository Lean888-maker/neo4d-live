name: SEO Bot Network Daily Publisher

on:
  schedule:
    # Run every day at 00:00 UTC (8:00 AM Malaysia Time)
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows manual triggering from GitHub UI

jobs:
  generate_and_publish:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate and Distribute SEO Articles
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          MEDIUM_INTEGRATION_TOKEN: ${{ secrets.MEDIUM_INTEGRATION_TOKEN }}
          BLOGGER_API_KEY: ${{ secrets.BLOGGER_API_KEY }}
          BLOG_ID: ${{ secrets.BLOG_ID }}
          DEVTO_API_KEY: ${{ secrets.DEVTO_API_KEY }}
          TUMBLR_API_KEY: ${{ secrets.TUMBLR_API_KEY }}
          TUMBLR_BLOG_ID: ${{ secrets.TUMBLR_BLOG_ID }}
          TUMBLR_OAUTH_TOKEN: ${{ secrets.TUMBLR_OAUTH_TOKEN }}
          WP_DOMAIN: ${{ secrets.WP_DOMAIN }}
          WP_USERNAME: ${{ secrets.WP_USERNAME }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
          HASHNODE_API_KEY: ${{ secrets.HASHNODE_API_KEY }}
          HASHNODE_PUB_ID: ${{ secrets.HASHNODE_PUB_ID }}
        run: node seo-bots/supercharge_manager.js

      - name: Install FFmpeg for Video Generation
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Generate and Publish Facebook Reel
        env:
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
        run: node seo-bots/run_facebook_video.js

      - name: Commit Generated Article to PBN Folder
        run: |
          git config --global user.name 'SEO Bot'
          git config --global user.email 'seo-bot@neo4d.live'
          git add seo-bots/output/*.md
          git commit -m "docs(seo): publish daily SEO article" || echo "No new articles to commit"
          git push
